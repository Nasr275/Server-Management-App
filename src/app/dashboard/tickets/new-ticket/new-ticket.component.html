<form (ngSubmit)="onSubmit()">
    <app-control label="Title">
        <input type="text" name="title" id='title'>
    </app-control>
    <app-control label="Request">
        <textarea type="text" name="title" id='title' rows="3"></textarea>
    </app-control>

    <p>
        <button appButton>
            Submit
            <span ngProjectAs="icon">⌲</span>
        </button>
    </p>
</form>
